<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paex360 - Centro</title>
  <link rel="icon" href="paex360-logo.png" type="image/png">

  <style>
    :root{
      --bg:#f3f2f0;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --danger:#dc2626;
      --primary:#111827;
      --border:#e5e7eb;
      --shadow:0 10px 30px rgba(0,0,0,.10);
      --radius:14px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 16px;
      background:#ffffff;
      border-bottom:1px solid var(--border);
      position:sticky;
      top:0;
      z-index:20;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      color:var(--text);
    }

    .brand img{
      width:28px;
      height:28px;
      border-radius:8px;
      border:1px solid var(--border);
      background:#fff;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .btn{
      cursor:pointer;
      border:1px solid var(--border);
      background:#ffffff;
      color:#111827;
      padding:10px 12px;
      border-radius:10px;
      font-weight:900;
      font-size:13px;
    }

    .btn:hover{
      background:#f9fafb;
    }

    .page{
      max-width:1200px;
      margin:20px auto;
      padding:0 16px 20px;
    }

    .msg{
      display:none;
      padding:14px;
      background:rgba(220,38,38,.08);
      border:1px solid rgba(220,38,38,.25);
      border-radius:12px;
      margin:0 0 14px 0;
      font-weight:900;
      color:#991b1b;
    }

    .loader{
      display:none;
      padding:12px 14px;
      background:#f9fafb;
      border:1px solid var(--border);
      border-radius:12px;
      margin:0 0 14px 0;
      font-weight:900;
      color:#374151;
    }

    .layout{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:16px;
    }

    .sidebar,
    .main-card{
      background:var(--card);
      border-radius:16px;
      box-shadow:var(--shadow);
    }

    .sidebar{
      padding:16px;
    }

    .sidebar-section{
      margin-bottom:20px;
    }

    .sidebar-title{
      font-size:13px;
      font-weight:900;
      color:#6b7280;
      text-transform:uppercase;
      letter-spacing:.4px;
      margin:0 0 12px 0;
    }

    .sidebar-card{
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      background:#fafafa;
    }

    .sidebar-text{
      font-size:13px;
      font-weight:800;
      color:#374151;
      line-height:1.4;
    }

    .doc-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }

    .doc-link{
      display:block;
      text-decoration:none;
      color:#111827;
      border:1px solid var(--border);
      background:#fff;
      border-radius:12px;
      padding:12px;
      font-size:13px;
      font-weight:800;
      transition:.15s ease;
      word-break:break-word;
    }

    .doc-link:hover{
      background:#f9fafb;
      border-color:#9ca3af;
    }

    .doc-empty{
      font-size:13px;
      font-weight:700;
      color:#6b7280;
      padding:10px 0;
      line-height:1.5;
    }

    .main-card{
      padding:22px;
      min-height:640px;
    }

    .hero-title{
      margin:0 0 6px 0;
      font-size:28px;
      font-weight:900;
      line-height:1.2;
    }

    .hero-subtitle{
      margin:0 0 22px 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
      font-weight:600;
      max-width:760px;
    }

    .menu-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(180px, 1fr));
      gap:16px;
      margin-top:8px;
    }

    .menu-card{
      border:1px solid var(--border);
      border-radius:16px;
      background:#fff;
      padding:18px;
      cursor:pointer;
      transition:.15s ease;
      text-align:left;
      min-height:160px;
    }

    .menu-card:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 22px rgba(0,0,0,.06);
      border-color:#9ca3af;
    }

    .menu-icon{
      font-size:28px;
      margin-bottom:14px;
      display:block;
    }

    .menu-title{
      font-size:18px;
      font-weight:900;
      margin:0 0 8px 0;
      color:#111827;
    }

    .menu-text{
      font-size:13px;
      line-height:1.5;
      color:#6b7280;
      font-weight:600;
      margin:0;
    }

    .user-line{
      margin-top:24px;
      padding-top:16px;
      border-top:1px solid var(--border);
      color:#6b7280;
      font-size:13px;
      font-weight:700;
    }

    @media(max-width: 980px){
      .layout{
        grid-template-columns:1fr;
      }

      .menu-grid{
        grid-template-columns:1fr;
      }

      .hero-title{
        font-size:24px;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">
      <img src="paex360-logo.png" alt="Paex360">
      <span id="centerTitle">Centro</span>
    </div>

    <div class="actions">
      <button class="btn" id="backBtn">Volver</button>
      <button class="btn" id="logoutBtn">Cerrar sesión</button>
    </div>
  </div>

  <div class="page">
    <div class="msg" id="msg"></div>
    <div class="loader" id="loader">Cargando centro...</div>

    <div class="layout" id="content" style="display:none;">
      <aside class="sidebar">
        <div class="sidebar-section">
          <h3 class="sidebar-title">Centro actual</h3>
          <div class="sidebar-card">
            <div class="sidebar-text" id="sidebarCenterName">Cargando...</div>
          </div>
        </div>

        <div class="sidebar-section" id="documentsSection" style="display:none;">
          <h3 class="sidebar-title">Documentos PDF</h3>
          <div class="doc-list" id="documentsList"></div>
        </div>
      </aside>

      <main class="main-card">
        <h1 class="hero-title" id="heroTitle">Centro</h1>
        <p class="hero-subtitle">
          Selecciona el módulo al que deseas ingresar. Desde aquí puedes entrar al dashboard, responder la encuesta o abrir los documentos PDF del centro.
        </p>

        <div class="menu-grid">
          <button class="menu-card" id="dashboardCard">
            <span class="menu-icon">📊</span>
            <h2 class="menu-title">Dashboard</h2>
            <p class="menu-text">Visualiza el reporte Power BI del centro seleccionado.</p>
          </button>

          <button class="menu-card" id="surveyCard">
            <span class="menu-icon">📝</span>
            <h2 class="menu-title">Encuesta</h2>
            <p class="menu-text">Accede al formulario de autoevaluación y seguimiento.</p>
          </button>

          <button class="menu-card" id="pdfCard">
            <span class="menu-icon">📄</span>
            <h2 class="menu-title">Documentos PDF</h2>
            <p class="menu-text">Consulta la documentación disponible del centro.</p>
          </button>
        </div>

        <div class="user-line" id="userLine"></div>
      </main>
    </div>
  </div>

  <script type="module">
    const CENTERS = {
      salus: { label: "Clínica SALUS" },
      diagonal: { label: "Clínica Diagonal" }
    };

    const msg = document.getElementById("msg");
    const loader = document.getElementById("loader");
    const content = document.getElementById("content");
    const centerTitle = document.getElementById("centerTitle");
    const sidebarCenterName = document.getElementById("sidebarCenterName");
    const heroTitle = document.getElementById("heroTitle");
    const userLine = document.getElementById("userLine");

    const documentsSection = document.getElementById("documentsSection");
    const documentsList = document.getElementById("documentsList");

    const dashboardCard = document.getElementById("dashboardCard");
    const surveyCard = document.getElementById("surveyCard");
    const pdfCard = document.getElementById("pdfCard");

    function showError(text){
      msg.style.display = "block";
      msg.textContent = text;
      loader.style.display = "none";
      content.style.display = "none";
    }

    function hideError(){
      msg.style.display = "none";
      msg.textContent = "";
    }

    function setLoading(on, text = "Cargando centro..."){
      loader.style.display = on ? "block" : "none";
      loader.textContent = text;
      if (on) hideError();
    }

    function getQueryParam(name){
      const url = new URL(window.location.href);
      return (url.searchParams.get(name) || "").trim();
    }

    function renderDocuments(documents){
      documentsList.innerHTML = "";

      if (!documents || documents.length === 0) {
        documentsList.innerHTML = `<div class="doc-empty">No hay documentos disponibles para este centro.</div>`;
        documentsSection.style.display = "block";
        return;
      }

      documents.forEach(doc => {
        const a = document.createElement("a");
        a.className = "doc-link";
        a.href = doc.ruta;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = doc.nombre;
        documentsList.appendChild(a);
      });

      documentsSection.style.display = "block";
    }

    function renderDocumentsError(errorMessage){
      documentsSection.style.display = "block";
      documentsList.innerHTML = `<div class="doc-empty">Error cargando documentos: ${errorMessage}</div>`;
    }

    async function pedirPermisos(email){
      const resp = await fetch("/.netlify/functions/getPermissions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });

      const data = await resp.json().catch(() => ({}));

      if (!resp.ok) {
        throw new Error(data?.error || "No se pudieron consultar permisos");
      }

      return data;
    }

    async function pedirDocumentos(email, center){
      const resp = await fetch("/.netlify/functions/getDocuments", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, center })
      });

      const data = await resp.json().catch(() => ({}));

      if (!resp.ok) {
        throw new Error(data?.error || "No se pudieron consultar documentos");
      }

      return data.documents || [];
    }

    function validarAccesoCentro(permissions, center){
      if (center === "diagonal") return permissions.Clinica_Diagonal === true;
      if (center === "salus") return permissions.Clinica_Salus === true;
      return false;
    }

    const centerKey = getQueryParam("center").toLowerCase();
    const centerCfg = CENTERS[centerKey];

    if (!centerCfg) {
      showError("Centro inválido. Vuelve y selecciona un centro.");
      throw new Error("Invalid center");
    }

    centerTitle.textContent = centerCfg.label;
    sidebarCenterName.textContent = centerCfg.label;
    heroTitle.textContent = centerCfg.label;

    let firebaseConfig = null;

    try {
      const r = await fetch("/.netlify/functions/getConfig", { cache: "no-store" });
      const cfg = await r.json().catch(() => ({}));

      if (!r.ok) {
        throw new Error(cfg?.error || "getConfig no respondió OK");
      }

      firebaseConfig = cfg.firebaseConfig || cfg;
    } catch (e) {
      showError("No se pudo cargar la configuración de Firebase.");
      throw e;
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("backBtn").onclick = () => {
      window.location.href = "index.html";
    };

    document.getElementById("logoutBtn").onclick = async () => {
      await signOut(auth);
      window.location.href = "index.html";
    };

    const INACTIVITY_LIMIT_MS = 30 * 60 * 1000;
    let inactivityTimer = null;

    function clearInactivityTimer(){
      if (inactivityTimer) {
        clearTimeout(inactivityTimer);
        inactivityTimer = null;
      }
    }

    async function forceLogoutByInactivity(){
      try {
        await signOut(auth);
      } catch (e) {
        console.warn("Logout por inactividad falló:", e);
      } finally {
        window.location.href = "index.html";
      }
    }

    function resetInactivityTimer(){
      clearInactivityTimer();
      inactivityTimer = setTimeout(forceLogoutByInactivity, INACTIVITY_LIMIT_MS);
    }

    function attachActivityListeners(){
      const events = ["mousemove","mousedown","keydown","scroll","touchstart","click"];
      events.forEach(evt => window.addEventListener(evt, resetInactivityTimer, { passive: true }));
    }

    attachActivityListeners();

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        clearInactivityTimer();
        window.location.href = "index.html";
        return;
      }

      resetInactivityTimer();

      try {
        setLoading(true, "Validando acceso al centro...");

        const email = (user.email || "").toLowerCase().trim();
        userLine.textContent = `Usuario: ${email}`;

        const permisosData = await pedirPermisos(email);
        const permissions = permisosData.permissions || {};

        const autorizado = validarAccesoCentro(permissions, centerKey);

        if (!autorizado) {
          await signOut(auth);
          showError("No tienes permisos para ingresar a este centro.");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1500);
          return;
        }

        dashboardCard.onclick = () => {
          window.location.href = `dashboard.html?center=${centerKey}`;
        };

        surveyCard.onclick = () => {
          window.location.href = `survey.html?center=${centerKey}`;
        };

        pdfCard.onclick = () => {
          const firstDoc = documentsList.querySelector("a.doc-link");
          if (firstDoc) {
            firstDoc.click();
            return;
          }
          alert("No hay documentos PDF disponibles para este centro.");
        };

        if (permissions.Puede_Documentos === true) {
          try {
            setLoading(true, "Cargando documentos...");
            const docs = await pedirDocumentos(email, centerKey);
            renderDocuments(docs);
          } catch (docErr) {
            console.error("ERROR DOCUMENTOS:", docErr);
            renderDocumentsError(docErr.message);
          }
        } else {
          documentsSection.style.display = "none";
        }

        setLoading(false);
        content.style.display = "grid";

      } catch (e) {
        console.error(e);
        showError("No se pudo cargar el centro: " + e.message);
      }
    });
  </script>
</body>
</html>
