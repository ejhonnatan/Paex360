<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paex360 - Dashboard</title>
  <link rel="icon" href="paex360-logo.png" type="image/png">

  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #f3f2f0;
      color:#111827;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top:0;
      z-index: 20;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      letter-spacing:.2px;
      color:#111827;
    }

    .brand img{
      width:28px;
      height:28px;
      border-radius:8px;
      background:#fff;
      border:1px solid #e5e7eb;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .btn{
      cursor:pointer;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      color:#111827;
      padding:10px 12px;
      border-radius: 10px;
      font-weight:900;
      font-size:13px;
    }

    .btn:hover{
      background:#f9fafb;
    }

    .layout{
      display:flex;
      min-height: calc(100vh - 58px);
    }

    .sidebar{
      width: 280px;
      min-width: 280px;
      background:#ffffff;
      border-right:1px solid #e5e7eb;
      padding:16px;
      overflow-y:auto;
    }

    .sidebar-title{
      font-size:13px;
      font-weight:900;
      color:#6b7280;
      text-transform:uppercase;
      letter-spacing:.4px;
      margin:0 0 12px 0;
    }

    .sidebar-section{
      margin-bottom:20px;
    }

    .sidebar-card{
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:12px;
      background:#fafafa;
    }

    .sidebar-text{
      font-size:13px;
      font-weight:700;
      color:#374151;
      line-height:1.4;
    }

    .doc-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }

    .doc-link{
      display:block;
      text-decoration:none;
      color:#111827;
      border:1px solid #e5e7eb;
      background:#fff;
      border-radius:12px;
      padding:12px;
      font-size:13px;
      font-weight:800;
      transition:.15s ease;
    }

    .doc-link:hover{
      background:#f9fafb;
      border-color:#9ca3af;
    }

    .doc-empty{
      font-size:13px;
      font-weight:700;
      color:#6b7280;
      padding:10px 0;
    }

    .main{
      flex:1;
      padding:14px;
      background: transparent;
    }

    .msg{
      padding: 14px;
      background: rgba(220,38,38,.08);
      border: 1px solid rgba(220,38,38,.25);
      border-radius: 12px;
      margin: 0 0 14px 0;
      display:none;
      font-weight:900;
      color:#991b1b;
    }

    .loader{
      padding: 12px 14px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin: 0 0 14px 0;
      display:none;
      font-weight:900;
      color:#374151;
    }

    #reportContainer{
      width: 100%;
      height: calc(100vh - 110px);
      border-radius: 12px;
      overflow: hidden;
      background: transparent;
      border: none;
    }

    @media(max-width: 980px){
      .layout{
        flex-direction:column;
      }

      .sidebar{
        width:100%;
        min-width:100%;
        border-right:none;
        border-bottom:1px solid #e5e7eb;
      }

      #reportContainer{
        height: calc(100vh - 320px);
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">
      <img src="paex360-logo.png" alt="Paex360">
      <span id="centerTitle">Dashboard</span>
    </div>
    <div class="actions">
      <button class="btn" id="backBtn">Volver</button>
      <button class="btn" id="logoutBtn">Cerrar sesión</button>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-title">Centro actual</h3>
        <div class="sidebar-card">
          <div class="sidebar-text" id="sidebarCenterName">Cargando...</div>
        </div>
      </div>

      <div class="sidebar-section" id="documentsSection" style="display:none;">
        <h3 class="sidebar-title">Documentos PDF</h3>
        <div class="doc-list" id="documentsList"></div>
      </div>
    </aside>

    <main class="main">
      <div class="msg" id="msg"></div>
      <div class="loader" id="loader">Cargando dashboard...</div>
      <div id="reportContainer"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>

  <script type="module">
    const WORKSPACE_ID = "7230301b-540b-4f1a-b94d-c3ff22d4564d";

    const CENTERS = {
      salus:    { label: "Clínica SALUS",    reportId: "be0ed5d8-4753-4dd0-b031-ed0b7ab57d96" },
      diagonal: { label: "Clínica Diagonal", reportId: "c82cbcf1-7b93-458a-8f14-3b7a86800a23" }
    };

    const msg = document.getElementById("msg");
    const loader = document.getElementById("loader");
    const centerTitle = document.getElementById("centerTitle");
    const reportContainer = document.getElementById("reportContainer");
    const sidebarCenterName = document.getElementById("sidebarCenterName");
    const documentsSection = document.getElementById("documentsSection");
    const documentsList = document.getElementById("documentsList");

    function showError(text){
      msg.style.display = "block";
      msg.textContent = text;
      loader.style.display = "none";
    }

    function setLoading(on){
      loader.style.display = on ? "block" : "none";
      if(on){
        msg.style.display = "none";
        msg.textContent = "";
      }
    }

    function getQueryParam(name){
      const url = new URL(window.location.href);
      return (url.searchParams.get(name) || "").trim();
    }

    function renderDocuments(documents){
      documentsList.innerHTML = "";

      if (!documents || documents.length === 0) {
        documentsList.innerHTML = `<div class="doc-empty">No hay documentos disponibles para este centro.</div>`;
        documentsSection.style.display = "block";
        return;
      }

      documents.forEach(doc => {
        const a = document.createElement("a");
        a.className = "doc-link";
        a.href = doc.ruta;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = doc.nombre;
        documentsList.appendChild(a);
      });

      documentsSection.style.display = "block";
    }

    const centerKey = getQueryParam("center").toLowerCase();
    const centerCfg = CENTERS[centerKey];

    if (!centerCfg) {
      showError("Centro inválido. Vuelve y selecciona un centro.");
      centerTitle.textContent = "Dashboard";
      throw new Error("Invalid center");
    }

    centerTitle.textContent = centerCfg.label;
    sidebarCenterName.textContent = centerCfg.label;

    let firebaseConfig = null;
    try {
      const r = await fetch("/.netlify/functions/getConfig", { cache: "no-store" });
      const cfg = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(cfg?.error || "getConfig no respondió OK");
      firebaseConfig = cfg.firebaseConfig || cfg;
    } catch (e) {
      showError("No se pudo cargar la configuración de Firebase.");
      throw e;
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("backBtn").onclick = () => window.location.href = "index.html";
    document.getElementById("logoutBtn").onclick = async () => {
      await signOut(auth);
      window.location.href = "index.html";
    };

    const INACTIVITY_LIMIT_MS = 30 * 60 * 1000;
    let inactivityTimer = null;

    function clearInactivityTimer(){
      if (inactivityTimer) {
        clearTimeout(inactivityTimer);
        inactivityTimer = null;
      }
    }

    async function forceLogoutByInactivity(){
      try{
        await signOut(auth);
      }catch(e){
        console.warn("Logout por inactividad falló:", e);
      }finally{
        window.location.href = "index.html";
      }
    }

    function resetInactivityTimer(){
      clearInactivityTimer();
      inactivityTimer = setTimeout(forceLogoutByInactivity, INACTIVITY_LIMIT_MS);
    }

    function attachActivityListeners(){
      const events = ["mousemove","mousedown","keydown","scroll","touchstart","click"];
      events.forEach(evt => window.addEventListener(evt, resetInactivityTimer, { passive: true }));
    }

    attachActivityListeners();

    async function pedirEmbedData(workspaceId, reportId){
      const resp = await fetch("/.netlify/functions/getPowerBI", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ workspaceId, reportId })
      });

      const data = await resp.json().catch(() => ({}));

      if (!resp.ok) {
        const extra = data?.raw ? ` | raw: ${data.raw}` : "";
        throw new Error((data?.error || "Error getPowerBI") + extra);
      }

      return data;
    }

    async function pedirPermisos(email){
      const resp = await fetch("/.netlify/functions/getPermissions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });

      const data = await resp.json().catch(() => ({}));

      if (!resp.ok) {
        throw new Error(data?.error || "No se pudieron consultar permisos");
      }

      return data;
    }

    async function pedirDocumentos(email, center){
      const resp = await fetch("/.netlify/functions/getDocuments", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, center })
      });

      const data = await resp.json().catch(() => ({}));

      if (!resp.ok) {
        throw new Error(data?.error || "No se pudieron consultar documentos");
      }

      return data.documents || [];
    }

    function validarAccesoCentro(permissions, center){
      if (center === "diagonal") return permissions.Clinica_Diagonal === true;
      if (center === "salus") return permissions.Clinica_Salus === true;
      return false;
    }

    function embedReport(embedUrl, embedToken){
      powerbi.reset(reportContainer);

      const models = window["powerbi-client"].models;

      const config = {
        type: "report",
        tokenType: models.TokenType.Embed,
        accessToken: embedToken,
        embedUrl: embedUrl,
        settings: {
          panes: {
            filters: { visible: false },
            pageNavigation: { visible: true }
          },
          background: models.BackgroundType.Default
        }
      };

      powerbi.embed(reportContainer, config);
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        clearInactivityTimer();
        window.location.href = "index.html";
        return;
      }

      resetInactivityTimer();

      try {
        setLoading(true);

        const email = (user.email || "").toLowerCase().trim();

        const permisosData = await pedirPermisos(email);
        const permissions = permisosData.permissions || {};

        const autorizado = validarAccesoCentro(permissions, centerKey);

        if (!autorizado) {
          await signOut(auth);
          showError("No tienes permisos para ingresar a este centro.");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1500);
          return;
        }

        if (permissions.Puede_Documentos === true) {
          try {
            const docs = await pedirDocumentos(email, centerKey);
            renderDocuments(docs);
          } catch (docErr) {
            console.error(docErr);
            renderDocuments([]);
          }
        } else {
          documentsSection.style.display = "none";
        }

        const data = await pedirEmbedData(WORKSPACE_ID, centerCfg.reportId);

        const embedToken = data.embedToken;
        const embedUrl = data.embedUrl;

        if (!embedToken || !embedUrl) {
          throw new Error("Respuesta incompleta: falta embedToken o embedUrl");
        }

        embedReport(embedUrl, embedToken);
        setLoading(false);

      } catch (e) {
        console.error(e);
        showError("No se pudo cargar el dashboard: " + e.message);
      }
    });
  </script>
</body>
</html>
