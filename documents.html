<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paex360 - Documentos PDF</title>
  <link rel="icon" href="paex360-logo.png" type="image/png">

  <style>
    :root{
      --bg:#f3f2f0;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow:0 10px 30px rgba(0,0,0,.10);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 16px;
      background:#ffffff;
      border-bottom:1px solid var(--border);
      position:sticky;
      top:0;
      z-index:20;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      color:var(--text);
    }

    .brand img{
      width:28px;
      height:28px;
      border-radius:8px;
      border:1px solid var(--border);
      background:#fff;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .btn{
      cursor:pointer;
      border:1px solid var(--border);
      background:#ffffff;
      color:#111827;
      padding:10px 12px;
      border-radius:10px;
      font-weight:900;
      font-size:13px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn:hover{
      background:#f9fafb;
    }

    .page{
      padding:16px;
    }

    .msg{
      display:none;
      padding:14px;
      background:rgba(220,38,38,.08);
      border:1px solid rgba(220,38,38,.25);
      border-radius:12px;
      margin:0 0 14px 0;
      font-weight:900;
      color:#991b1b;
    }

    .loader{
      display:none;
      padding:12px 14px;
      background:#f9fafb;
      border:1px solid var(--border);
      border-radius:12px;
      margin:0 0 14px 0;
      font-weight:900;
      color:#374151;
    }

    .layout{
      display:grid;
      grid-template-columns:340px 1fr;
      gap:16px;
      min-height:calc(100vh - 95px);
    }

    .sidebar,
    .viewer-card{
      background:var(--card);
      border-radius:16px;
      box-shadow:var(--shadow);
    }

    .sidebar{
      padding:16px;
      overflow:auto;
    }

    .sidebar-title{
      font-size:13px;
      font-weight:900;
      color:#6b7280;
      text-transform:uppercase;
      margin:0 0 12px 0;
    }

    .center-box{
      border:1px solid var(--border);
      border-radius:12px;
      background:#fafafa;
      padding:12px;
      margin-bottom:16px;
      font-weight:900;
      color:#111827;
    }

    .doc-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .doc-btn{
      width:100%;
      text-align:left;
      border:1px solid var(--border);
      background:#fff;
      border-radius:12px;
      padding:12px;
      cursor:pointer;
      font-size:13px;
      font-weight:800;
      color:#111827;
      transition:.15s ease;
      word-break:break-word;
    }

    .doc-btn:hover{
      background:#f9fafb;
      border-color:#9ca3af;
    }

    .doc-btn.active{
      border-color:#111827;
      background:#f3f4f6;
    }

    .viewer-card{
      padding:16px;
      display:flex;
      flex-direction:column;
      min-height:760px;
    }

    .viewer-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .viewer-title{
      font-size:20px;
      font-weight:900;
      margin:0;
      color:#111827;
      word-break:break-word;
    }

    .viewer-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pdf-frame{
      width:100%;
      height:calc(100vh - 180px);
      border:1px solid var(--border);
      border-radius:12px;
      background:#fafafa;
    }

    .empty-viewer{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#6b7280;
      font-weight:700;
      border:1px dashed var(--border);
      border-radius:12px;
      background:#fafafa;
      padding:20px;
      min-height:420px;
    }

    @media(max-width: 980px){
      .layout{
        grid-template-columns:1fr;
      }

      .pdf-frame{
        height:70vh;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">
      <img src="paex360-logo.png" alt="Paex360">
      <span id="centerTitle">Documentos PDF</span>
    </div>

    <div class="actions">
      <button class="btn" id="backBtn">Volver</button>
      <button class="btn" id="logoutBtn">Cerrar sesión</button>
    </div>
  </div>

  <div class="page">
    <div class="msg" id="msg"></div>
    <div class="loader" id="loader">Cargando documentos...</div>

    <div class="layout" id="content" style="display:none;">
      <aside class="sidebar">
        <h3 class="sidebar-title">Centro actual</h3>
        <div class="center-box" id="centerBox">Cargando...</div>

        <h3 class="sidebar-title">Listado de documentos</h3>
        <div class="doc-list" id="documentsList"></div>
      </aside>

      <main class="viewer-card">
        <div class="viewer-header">
          <h1 class="viewer-title" id="viewerTitle">Selecciona un documento</h1>

          <div class="viewer-actions">
            <a class="btn" id="openNewTabBtn" href="#" target="_blank" rel="noopener noreferrer" style="display:none;">Abrir en nueva pestaña</a>
          </div>
        </div>

        <div class="empty-viewer" id="emptyViewer">
          Selecciona un PDF del listado para visualizarlo aquí.
        </div>

        <iframe id="pdfFrame" class="pdf-frame" style="display:none;" title="Visor PDF"></iframe>
      </main>
    </div>
  </div>

  <script type="module">
    const CENTERS = {
      salus: { label: "Clínica SALUS" },
      diagonal: { label: "Clínica Diagonal" }
    };

    const msg = document.getElementById("msg");
    const loader = document.getElementById("loader");
    const content = document.getElementById("content");
    const centerTitle = document.getElementById("centerTitle");
    const centerBox = document.getElementById("centerBox");
    const documentsList = document.getElementById("documentsList");
    const viewerTitle = document.getElementById("viewerTitle");
    const pdfFrame = document.getElementById("pdfFrame");
    const emptyViewer = document.getElementById("emptyViewer");
    const openNewTabBtn = document.getElementById("openNewTabBtn");

    let loadedDocuments = [];
    let selectedPath = "";

    function showError(text){
      msg.style.display = "block";
      msg.textContent = text;
      loader.style.display = "none";
      content.style.display = "none";
    }

    function hideError(){
      msg.style.display = "none";
      msg.textContent = "";
    }

    function setLoading(on, text = "Cargando documentos..."){
      loader.style.display = on ? "block" : "none";
      loader.textContent = text;
      if (on) hideError();
    }

    function getQueryParam(name){
      const url = new URL(window.location.href);
      return (url.searchParams.get(name) || "").trim();
    }

    function validarAccesoCentro(permissions, center){
      if (center === "diagonal") return permissions.Clinica_Diagonal === true;
      if (center === "salus") return permissions.Clinica_Salus === true;
      return false;
    }

    function appendNoCache(url){
      if (!url) return "";
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}t=${Date.now()}`;
    }

    async function pedirPermisos(email){
      const resp = await fetch("/.netlify/functions/getPermissions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });

      const data = await resp.json().catch(() => ({}));

      if (!resp.ok) {
        throw new Error(data?.error || "No se pudieron consultar permisos");
      }

      return data;
    }

    async function pedirDocumentos(center){
      const resp = await fetch("/.netlify/functions/getDocuments", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ center })
      });

      const data = await resp.json().catch(() => ({}));

      if (!resp.ok) {
        throw new Error(data?.error || "No se pudieron consultar documentos");
      }

      return Array.isArray(data.documents) ? data.documents : [];
    }

    function selectDocument(doc){
      selectedPath = doc.ruta || "";
      viewerTitle.textContent = doc.nombre || "Documento PDF";

      const safeUrl = appendNoCache(selectedPath);

      pdfFrame.src = safeUrl;
      pdfFrame.style.display = "block";
      emptyViewer.style.display = "none";
      openNewTabBtn.style.display = safeUrl ? "inline-flex" : "none";
      openNewTabBtn.href = safeUrl;

      Array.from(documentsList.querySelectorAll(".doc-btn")).forEach(btn => {
        btn.classList.toggle("active", btn.dataset.path === selectedPath);
      });
    }

    function renderDocuments(documents){
      documentsList.innerHTML = "";

      if (!documents || documents.length === 0) {
        documentsList.innerHTML = `<div style="color:#6b7280;font-weight:700;font-size:13px;">No hay documentos disponibles para este centro.</div>`;
        viewerTitle.textContent = "Sin documentos";
        pdfFrame.style.display = "none";
        pdfFrame.src = "";
        emptyViewer.style.display = "flex";
        openNewTabBtn.style.display = "none";
        return;
      }

      documents.forEach((doc, index) => {
        if (!doc || !doc.nombre || !doc.ruta) {
          return;
        }

        const btn = document.createElement("button");
        btn.className = "doc-btn";
        btn.textContent = doc.nombre;
        btn.dataset.path = doc.ruta;
        btn.onclick = () => selectDocument(doc);
        documentsList.appendChild(btn);

        if (index === 0) {
          setTimeout(() => selectDocument(doc), 0);
        }
      });
    }

    const centerKey = getQueryParam("center").toLowerCase();
    const centerCfg = CENTERS[centerKey];

    if (!centerCfg) {
      showError("Centro inválido. Vuelve y selecciona un centro.");
      throw new Error("Invalid center");
    }

    centerTitle.textContent = `${centerCfg.label} - Documentos PDF`;
    centerBox.textContent = centerCfg.label;

    let firebaseConfig = null;

    try {
      const r = await fetch("/.netlify/functions/getConfig", { cache: "no-store" });
      const cfg = await r.json().catch(() => ({}));

      if (!r.ok) {
        throw new Error(cfg?.error || "getConfig no respondió OK");
      }

      firebaseConfig = cfg.firebaseConfig || cfg;
    } catch (e) {
      showError("No se pudo cargar la configuración de Firebase.");
      throw e;
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("backBtn").onclick = () => {
      window.location.href = `center.html?center=${centerKey}`;
    };

    document.getElementById("logoutBtn").onclick = async () => {
      await signOut(auth);
      window.location.href = "index.html";
    };

    const INACTIVITY_LIMIT_MS = 30 * 60 * 1000;
    let inactivityTimer = null;

    function clearInactivityTimer(){
      if (inactivityTimer) {
        clearTimeout(inactivityTimer);
        inactivityTimer = null;
      }
    }

    async function forceLogoutByInactivity(){
      try {
        await signOut(auth);
      } catch (e) {
        console.warn("Logout por inactividad falló:", e);
      } finally {
        window.location.href = "index.html";
      }
    }

    function resetInactivityTimer(){
      clearInactivityTimer();
      inactivityTimer = setTimeout(forceLogoutByInactivity, INACTIVITY_LIMIT_MS);
    }

    function attachActivityListeners(){
      const events = ["mousemove","mousedown","keydown","scroll","touchstart","click"];
      events.forEach(evt => window.addEventListener(evt, resetInactivityTimer, { passive: true }));
    }

    attachActivityListeners();

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        clearInactivityTimer();
        window.location.href = "index.html";
        return;
      }

      resetInactivityTimer();

      try {
        setLoading(true, "Validando acceso al centro...");

        const email = (user.email || "").toLowerCase().trim();

        const permisosData = await pedirPermisos(email);
        const permissions = permisosData.permissions || {};

        const autorizado = validarAccesoCentro(permissions, centerKey);

        if (!autorizado) {
          await signOut(auth);
          showError("No tienes permisos para ingresar a este centro.");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1500);
          return;
        }

        if (permissions.Puede_Documentos !== true) {
          showError("Tu usuario no tiene permisos para visualizar documentos PDF.");
          return;
        }

        setLoading(true, "Cargando documentos...");
        loadedDocuments = await pedirDocumentos(centerKey);

        renderDocuments(loadedDocuments);

        setLoading(false);
        content.style.display = "grid";

      } catch (e) {
        console.error(e);
        showError("No se pudo cargar los documentos: " + e.message);
      }
    });
  </script>
</body>
</html>
